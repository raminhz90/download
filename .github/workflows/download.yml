name: Download Files and Commit (Split 50MB)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        ref: ${{ github.ref }}

    - name: Read list.txt into output
      id: read_urls
      run: |
        if [ ! -f list.txt ]; then
          echo "list.txt NOT found!"
          exit 1
        fi
        echo "urls<<EOF" >> $GITHUB_OUTPUT
        cat list.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Generate timestamp folder name
      id: timestamp
      run: |
        TS=$(date -u +"%Y%m%d%H%M")
        echo "folder=$TS" >> $GITHUB_OUTPUT

    - name: Create timestamped download directory
      run: mkdir -p download/${{ steps.timestamp.outputs.folder }}

    - name: Download + Compress + Split Files
      run: |
        set -euo pipefail
        cd download/${{ steps.timestamp.outputs.folder }}

        echo "Starting downloads..."
        echo "${{ steps.read_urls.outputs.urls }}" | while IFS= read -r url; do
          if [ -z "$url" ]; then
            echo "[SKIP] Empty line in list.txt"
            continue
          fi

          echo "---------------------------------------------"
          echo "[INFO] Processing URL: $url"

          fname="$(basename "$url")"
          base="${fname%.*}"

          echo "[INFO] Filename: $fname"
          echo "[INFO] Base folder: $base"

          # Download file
          echo "[INFO] Downloading..."
          if ! curl -L --fail --show-error -o "$fname" "$url"; then
            echo "[ERROR] Download failed: $url"
            rm -f "$fname"
            continue
          fi

          # Create folder for the parts
          mkdir -p "$base"

          echo "[INFO] Compressing to tar.gz..."
          if ! tar -czf "$base/$fname.tar.gz" "$fname"; then
            echo "[ERROR] Compression failed: $fname"
            rm -f "$fname"
            continue
          fi

          echo "[INFO] Splitting to 50MB parts..."
          if ! split -b 50m "$base/$fname.tar.gz" "$base/${fname}.part_"; then
            echo "[ERROR] Split failed: $base/$fname.tar.gz"
            rm -f "$base/$fname.tar.gz"
            continue
          fi

          echo "[INFO] Cleaning temporary files..."
          rm -f "$base/$fname.tar.gz"
          rm -f "$fname"

          echo "[SUCCESS] Finished processing $fname"
          echo "---------------------------------------------"

        done


    - name: Remove old timestamp folders
      run: |
        cd download
        newest="${{ steps.timestamp.outputs.folder }}"
        echo "Keeping only: $newest"
        for dir in */; do
          d="${dir%/}"
          if [ "$d" != "$newest" ]; then
            echo "Deleting old: $d"
            rm -rf "$d"
          fi
        done

    - name: Commit split files
      if: ${{ github.event_name == 'workflow_dispatch' }}
      run: |
        set -e
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git add download

        if git diff --cached --quiet; then
          echo "No changes to commit."
          exit 0
        fi

        git pull --rebase --autostash
        git commit -m "Add split 50MB downloads for ${{ steps.timestamp.outputs.folder }}"
        git push
