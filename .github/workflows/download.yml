name: Download Files Into Repo

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false

      - name: Completely disable Git LFS
        run: |
          git lfs uninstall || true

          rm -f .gitattributes || true

          git config --global filter.lfs.clean ""
          git config --global filter.lfs.smudge ""
          git config --global filter.lfs.process ""
          git config --global filter.lfs.required false

          git config --global --unset filter.lfs.clean || true
          git config --global --unset filter.lfs.smudge || true
          git config --global --unset filter.lfs.process || true

      - name: Generate timestamp folder
        id: ts
        run: |
          TS=$(date +'%Y%m%d%H%M')
          DIR="datafiles/$TS"
          mkdir -p "$DIR"
          echo "dir=$DIR" >> $GITHUB_OUTPUT

      - name: Remove old folders
        run: |
          mkdir -p datafiles
          cd datafiles
          KEEP=$(basename "${{ steps.ts.outputs.dir }}")

          for d in */ ; do
            d=${d%/}
            if [ "$d" != "$KEEP" ]; then
              rm -rf "$d"
            fi
          done

      - name: Download, compress and split files
        run: |
          TARGET="${{ steps.ts.outputs.dir }}"
          cd "$TARGET"

          while IFS= read -r url || [ -n "$url" ]; do

            [ -z "$url" ] && continue

            echo "Processing $url"

            fname=$(basename "$url")
            hash=$(echo -n "$url" | sha1sum | cut -c1-6)

            folder="${fname}_parts_${hash}"
            mkdir -p "$folder"

            echo "Downloading..."
            curl -L --fail -o "$fname" "$url" || continue

            echo "Compressing..."
            tar -czf "$folder/$fname.tar.gz" "$fname"

            echo "Splitting..."
            split -b 50m "$folder/$fname.tar.gz" "$folder/${fname}.part_"

            rm "$fname"
            rm "$folder/$fname.tar.gz"

            echo "Done $fname"

          done < ../../list.txt

      - name: Verify no LFS pointers exist
        run: |
          if grep -r "git-lfs.github.com/spec" datafiles ; then
            echo "ERROR: LFS pointer detected!"
            exit 1
          fi

      - name: Commit files
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add datafiles -f

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "Add downloaded files"

          git pull --rebase
          git push
