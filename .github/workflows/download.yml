name: Download Files Into Repo (Non‑LFS, RAR-Safe)

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest

    steps:
    # --------------------------------------------------------
    # CHECKOUT
    # --------------------------------------------------------
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: false

    # --------------------------------------------------------
    # DISABLE LFS COMPLETELY
    # --------------------------------------------------------
    - name: Disable Git LFS fully
      run: |
        git lfs uninstall || true

        rm -f .gitattributes || true

        git config --global filter.lfs.clean ""
        git config --global filter.lfs.smudge ""
        git config --global filter.lfs.process ""
        git config --global filter.lfs.required false

        git config --global --unset filter.lfs.clean || true
        git config --global --unset filter.lfs.smudge || true
        git config --global --unset filter.lfs.process || true

    # --------------------------------------------------------
    # GENERATE TIMESTAMPED FOLDER
    # --------------------------------------------------------
    - name: Generate timestamp folder
      id: ts
      run: |
        TS=$(date +'%Y%m%d%H%M')
        DIR="datafiles/$TS"
        mkdir -p "$DIR"
        echo "dir=$DIR" >> $GITHUB_OUTPUT

    # --------------------------------------------------------
    # REMOVE OLD FOLDERS
    # --------------------------------------------------------
    - name: Remove old timestamp folders
      run: |
        mkdir -p datafiles
        cd datafiles

        KEEP=$(basename "${{ steps.ts.outputs.dir }}")

        for d in */ ; do
          d=${d%/}
          if [ "$d" != "$KEEP" ]; then
            rm -rf "$d"
          fi
        done

    # --------------------------------------------------------
    # INSTALL RAR UTILITY
    # --------------------------------------------------------
    - name: Install rar utility
      run: |
        sudo apt-get update
        sudo apt-get install -y rar

    # --------------------------------------------------------
    # DOWNLOAD, COMPRESS, AND SPLIT USING RAR
    # WITH WINDOWS-SAFE FILENAMES
    # --------------------------------------------------------
    - name: Download, compress, and split files with RAR
      run: |
        TARGET="${{ steps.ts.outputs.dir }}"
        cd "$TARGET"

        sanitize() {
          # Replace characters illegal in Windows filenames:
          #  < > : " / \ | ? *
          echo "$1" | sed 's/[<>:"\/\\|?*]/_/g'
        }

        while IFS= read -r url || [ -n "$url" ]; do

          [ -z "$url" ] && continue

          echo "Processing $url"

          raw=$(basename "$url")
          fname=$(sanitize "$raw")

          hash=$(echo -n "$url" | sha1sum | cut -c1-6)
          folder="${fname}_parts_${hash}"

          mkdir -p "$folder"

          echo "Downloading..."
          curl -L --fail -o "$fname" "$url" || continue

          echo "Compressing with RAR..."
          rar a -v50m "$folder/$fname.rar" "$fname"

          rm "$fname"

          echo "Done $fname"

        done < ../../list.txt

    # --------------------------------------------------------
    # ENSURE NO LFS POINTERS SNUCK IN
    # --------------------------------------------------------
    - name: Verify no LFS pointers exist
      run: |
        if grep -r "git-lfs.github.com/spec" datafiles ; then
          echo "ERROR: LFS pointer detected!"
          exit 1
        fi

    # --------------------------------------------------------
    # CREATE NEW BRANCH, COMMIT & PUSH
    # --------------------------------------------------------
    - name: Create new branch and commit changes
      run: |
        # Generate a unique branch name
        BRANCH_NAME="files-$(date +'%Y%m%d%H%M%S')"
        
        # Checkout to a new branch
        git checkout -b $BRANCH_NAME
        
        git config user.name "github-actions"
        git config user.email "actions@github.com"

        # Add all generated files
        git add datafiles -f

        if git diff --cached --quiet; then
          echo "Nothing to commit"
          exit 0
        fi

        # Commit the changes
        git commit -m "Add downloaded files to branch $BRANCH_NAME"

        # Push the branch to the remote
        git push origin $BRANCH_NAME
