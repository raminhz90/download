name: Download Files and Commit

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Read list.txt into output
      id: read_urls
      run: |
        if [ ! -f list.txt ]; then
          echo "list.txt NOT found!"
          exit 1
        fi
        echo "urls<<EOF" >> $GITHUB_OUTPUT
        cat list.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Generate timestamp folder name
      id: timestamp
      run: |
        TS=$(date -u +"%Y%m%d%H%M")
        echo "folder=$TS" >> $GITHUB_OUTPUT

    - name: Create dynamic download directory
      run: |
        mkdir -p download/${{ steps.timestamp.outputs.folder }}

    - name: Download each file (non-fatal)
      run: |
        cd download/${{ steps.timestamp.outputs.folder }}
        while read -r url; do
          [ -z "$url" ] && continue
          echo "Downloading: $url"
          fname=$(basename "$url")
          if curl -L --fail -o "$fname" "$url"; then
            echo "Success: $fname"
          else
            echo "FAILED: $url — skipping"
            rm -f "$fname"
          fi
        done <<< "${{ steps.read_urls.outputs.urls }}"

    - name: Remove old timestamp folders
      run: |
        cd download
        # Keep only the newest folder (sort by name, which works because of timestamp format)
        newest="${{ steps.timestamp.outputs.folder }}"
        echo "Keeping folder: $newest"

        for dir in */; do
          d="${dir%/}"
          if [ "$d" != "$newest" ]; then
            echo "Removing old folder: $d"
            rm -rf "$d"
          fi
        done

    - name: Commit downloaded files to repo
      if: ${{ github.event_name == 'workflow_dispatch' }}
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git add download

        if git diff --cached --quiet; then
          echo "No changes to commit."
        else
          git commit -m "Add downloads for ${{ steps.timestamp.outputs.folder }}"
          git push
        fi
