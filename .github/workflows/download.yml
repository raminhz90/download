name: Download and Commit Files (No LFS)

on:
  workflow_dispatch:

jobs:
  download_and_commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Ensure Git LFS is disabled
        run: |
          git lfs uninstall || true
          rm -f .gitattributes
          git rm --cached .gitattributes || true
          echo "LFS fully disabled."

      - name: Read URLs
        id: read_urls
        run: |
          urls=$(grep -v '^\s*$' list.txt || true)
          echo "urls<<EOF" >> $GITHUB_OUTPUT
          echo "$urls" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate timestamped folder
        id: timestamp
        run: |
          ts=$(date +'%Y%m%d%H%M')
          echo "folder=datafiles/$ts" >> $GITHUB_OUTPUT
          mkdir -p "datafiles/$ts"

      - name: Delete older folders
        run: |
          find datafiles -mindepth 1 -maxdepth 1 -type d \
            ! -name "${{ steps.timestamp.outputs.folder##*/ }}" -exec rm -rf {} +

      - name: Download + Compress + Split Files (Safe, Collision‑Proof)
        run: |
          set -euo pipefail
          cd "${{ steps.timestamp.outputs.folder }}"

          echo "Starting downloads..."
          echo "${{ steps.read_urls.outputs.urls }}" | while IFS= read -r url; do
            if [ -z "$url" ]; then
              echo "[SKIP] Empty line in list.txt"
              continue
            fi

            echo "---------------------------------------------"
            echo "[INFO] Processing URL: $url"

            fname="$(basename "$url")"

            # collision‑proof unique hash
            urlhash=$(echo -n "$url" | sha1sum | cut -c1-6)
            base="${fname}_parts_${urlhash}"

            echo "[INFO] Filename: $fname"
            echo "[INFO] Parts folder: $base"

            echo "[INFO] Downloading..."
            if ! curl -L --fail --show-error -o "$fname" "$url"; then
              echo "[ERROR] Download failed: $url"
              rm -f "$fname"
              continue
            fi

            mkdir -p "$base"

            echo "[INFO] Compressing..."
            if ! tar -czf "$base/$fname.tar.gz" "$fname"; then
              echo "[ERROR] Compression failed"
              rm -f "$fname"
              continue
            fi

            echo "[INFO] Splitting..."
            if ! split -b 50m "$base/$fname.tar.gz" "$base/${fname}.part_"; then
              echo "[ERROR] Splitting failed"
              rm -f "$base/$fname.tar.gz"
              rm -f "$fname"
              continue
            fi

            rm -f "$base/$fname.tar.gz"
            rm -f "$fname"

            echo "[SUCCESS] Completed: $fname"
            echo "---------------------------------------------"

          done

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update downloaded files [skip ci]"
          git pull --rebase
          git push
