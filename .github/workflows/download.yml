name: Download and Commit Files (No LFS)

on:
  workflow_dispatch:

jobs:
  download_and_commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Fully disable Git LFS
        run: |
          git lfs uninstall || true
          if [ -f .gitattributes ]; then
            rm -f .gitattributes
            git rm --cached .gitattributes || true
          fi
          echo "Git LFS disabled and .gitattributes removed."

      - name: Read URLs from list.txt
        id: read_urls
        run: |
          urls=$(grep -v '^\s*$' list.txt || true)
          echo "urls<<EOF" >> $GITHUB_OUTPUT
          echo "$urls" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate timestamped folder
        id: timestamp
        run: |
          ts=$(date +'%Y%m%d%H%M')
          out="datafiles/$ts"
          mkdir -p "$out"
          echo "folder=$out" >> $GITHUB_OUTPUT

      - name: Delete older timestamp folders
        run: |
          mkdir -p datafiles
          cd datafiles

          current="$(basename "${{ steps.timestamp.outputs.folder }}")"
          echo "Keeping folder: $current"

          find . -mindepth 1 -maxdepth 1 -type d \
            ! -name "$current" -exec rm -rf {} +

      - name: Download, Compress, Split Files (50MB, Collision‑proof)
        run: |
          set +e
          target="${{ steps.timestamp.outputs.folder }}"
          echo "[DEBUG] Target folder: $target"

          if [ ! -d "$target" ]; then
            echo "[FATAL] Target directory does NOT exist: $target"
            exit 2
          fi

          cd "$target" || { echo "[FATAL] cd failed"; exit 2; }

          echo "[DEBUG] Starting download loop..."
          echo "${{ steps.read_urls.outputs.urls }}" | while IFS= read -r url; do
            echo "---------------------------------------------"

            if [ -z "$url" ]; then
              echo "[SKIP] Empty line found"
              continue
            fi

            echo "[INFO] Processing URL: $url"

            fname="$(basename "$url")"
            echo "[DEBUG] basename = $fname"

            urlhash=$(echo -n "$url" | sha1sum | cut -c1-6)
            base="${fname}_parts_${urlhash}"
            echo "[DEBUG] base folder = $base"

            echo "[INFO] Downloading..."
            curl -L --fail --show-error -o "$fname" "$url"
            rc=$?
            if [ $rc -ne 0 ]; then
              echo "[ERROR] curl failed (exit $rc)"
              rm -f "$fname"
              continue
            fi

            echo "[INFO] Creating folder $base"
            mkdir -p "$base"
            if [ $? -ne 0 ]; then
              echo "[ERROR] mkdir failed → folder exists as a *file*?"
              ls -l
              continue
            fi

            echo "[INFO] Compressing into tar.gz..."
            tar -czf "$base/$fname.tar.gz" "$fname"
            rc=$?
            if [ $rc -ne 0 ]; then
              echo "[ERROR] tar failed (exit $rc)"
              rm -f "$fname"
              continue
            fi

            echo "[INFO] Splitting file..."
            split -b 50m "$base/$fname.tar.gz" "$base/${fname}.part_"
            rc=$?
            if [ $rc -ne 0 ]; then
              echo "[ERROR] split failed (exit $rc)"
              rm -f "$base/$fname.tar.gz"
              rm -f "$fname"
              continue
            fi

            echo "[INFO] Cleaning intermediate files..."
            rm -f "$base/$fname.tar.gz"
            rm -f "$fname"

            echo "[SUCCESS] Completed $fname"
          done

          echo "[DEBUG] End of loop"
          exit 0
