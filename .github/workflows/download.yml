name: Download Files and Commit (Split 50MB)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        ref: ${{ github.ref }}

    - name: Read list.txt into output
      id: read_urls
      run: |
        if [ ! -f list.txt ]; then
          echo "list.txt NOT found!"
          exit 1
        fi
        echo "urls<<EOF" >> $GITHUB_OUTPUT
        cat list.txt >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Generate timestamp folder name
      id: timestamp
      run: |
        TS=$(date -u +"%Y%m%d%H%M")
        echo "folder=$TS" >> $GITHUB_OUTPUT

    - name: Create timestamped download directory
      run: mkdir -p download/${{ steps.timestamp.outputs.folder }}

    - name: Download + Compress + Split Files
      run: |
        cd download/${{ steps.timestamp.outputs.folder }}

        while read -r url; do
          [ -z "$url" ] && continue

          fname=$(basename "$url")
          base="${fname%.*}"

          echo "Downloading $fname"
          if curl -L --fail -o "$fname" "$url"; then
            echo "Download ok: $fname"
          else
            echo "FAILED: $url"
            rm -f "$fname"
            continue
          fi

          # Make folder for the file
          mkdir -p "$base"

          echo "Compressing $fname..."
          tar -czf "$base/$fname.tar.gz" "$fname"

          echo "Splitting into 50MB chunks..."
          split -b 50m "$base/$fname.tar.gz" "$base/${fname}.part_"

          echo "Cleaning up original compressed file..."
          rm "$base/$fname.tar.gz"
          rm "$fname"

          echo "Done with: $fname"

        done <<< "${{ steps.read_urls.outputs.urls }}"

    - name: Remove old timestamp folders
      run: |
        cd download
        newest="${{ steps.timestamp.outputs.folder }}"
        echo "Keeping only: $newest"
        for dir in */; do
          d="${dir%/}"
          if [ "$d" != "$newest" ]; then
            echo "Deleting old: $d"
            rm -rf "$d"
          fi
        done

    - name: Commit split files
      if: ${{ github.event_name == 'workflow_dispatch' }}
      run: |
        set -e
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git add download

        if git diff --cached --quiet; then
          echo "No changes to commit."
          exit 0
        fi

        git pull --rebase --autostash
        git commit -m "Add split 50MB downloads for ${{ steps.timestamp.outputs.folder }}"
        git push
