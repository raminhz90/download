name: Download and Commit Files (No LFS)

on:
  workflow_dispatch:

jobs:
  download_and_commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Fully disable Git LFS
        run: |
          git lfs uninstall || true
          if [ -f .gitattributes ]; then
            rm -f .gitattributes
            git rm --cached .gitattributes || true
          fi
          echo "Git LFS disabled and .gitattributes removed."

      - name: Read URLs from list.txt
        id: read_urls
        run: |
          urls=$(grep -v '^\s*$' list.txt || true)
          echo "urls<<EOF" >> $GITHUB_OUTPUT
          echo "$urls" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate timestamped folder
        id: timestamp
        run: |
          ts=$(date +'%Y%m%d%H%M')
          out="datafiles/$ts"
          mkdir -p "$out"
          echo "folder=$out" >> $GITHUB_OUTPUT

      - name: Delete older timestamp folders
        run: |
          mkdir -p datafiles
          cd datafiles

          current="$(basename "${{ steps.timestamp.outputs.folder }}")"
          echo "Keeping folder: $current"

          find . -mindepth 1 -maxdepth 1 -type d \
            ! -name "$current" -exec rm -rf {} +

      - name: Download, Compress, Split Files (50MB, Collision‑proof)
        run: |
          set -euo pipefail
          target="${{ steps.timestamp.outputs.folder }}"
          cd "$target"

          echo "${{ steps.read_urls.outputs.urls }}" | while IFS= read -r url; do
            if [ -z "$url" ]; then
              echo "[SKIP] Empty line"
              continue
            fi

            echo "---------------------------------------------"
            echo "[INFO] Processing: $url"

            fname="$(basename "$url")"
            urlhash=$(echo -n "$url" | sha1sum | cut -c1-6)
            base="${fname}_parts_${urlhash}"

            echo "[INFO] File name: $fname"
            echo "[INFO] Output folder: $base"

            echo "[INFO] Downloading..."
            if ! curl -L --fail --show-error -o "$fname" "$url"; then
              echo "[ERROR] Failed: $url"
              rm -f "$fname"
              continue
            fi

            mkdir -p "$base"

            echo "[INFO] Compressing..."
            if ! tar -czf "$base/$fname.tar.gz" "$fname"; then
              echo "[ERROR] Compression failed"
              rm -f "$fname"
              continue
            fi

            echo "[INFO] Splitting into 50MB chunks..."
            if ! split -b 50m "$base/$fname.tar.gz" "$base/${fname}.part_"; then
              echo "[ERROR] Split failed"
              rm -f "$base/$fname.tar.gz"
              rm -f "$fname"
              continue
            fi

            # Clean up
            rm -f "$base/$fname.tar.gz"
            rm -f "$fname"

            echo "[SUCCESS] Completed: $fname"
