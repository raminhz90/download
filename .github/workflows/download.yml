name: Download Files and Create Release

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Read list.txt into output
        id: read_urls
        run: |
          if [ ! -f list.txt ]; then
            echo "list.txt NOT found!"
            exit 1
          fi

          echo "urls<<EOF" >> $GITHUB_OUTPUT
          cat list.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create download directory
        run: mkdir -p downloads

      - name: Download each file (non-fatal)
        run: |
          cd downloads
          while read -r url; do
            [ -z "$url" ] && continue

            echo "Downloading: $url"
            fname=$(basename "$url")

            # Try download but don't fail the workflow
            if curl -L --fail -o "$fname" "$url"; then
              echo "Success: $fname"
            else
              echo "FAILED: $url — skipping"
              rm -f "$fname"
            fi
          done <<< "${{ steps.read_urls.outputs.urls }}"

      - name: Determine release tag (short commit hash)
        id: tag
        run: |
          TAG=$(git rev-parse --short HEAD)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload assets
        uses: aaronbarnaby/create-release-action@v1.0.0
        with:
          api_token: ${{ secrets.GITHUB_TOKEN }}
          release_tag: ${{ steps.tag.outputs.tag }}
          prerelease: false
          title: "Auto Download ${{ steps.tag.outputs.tag }}"
          files: downloads/*
